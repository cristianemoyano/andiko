# Portainer UI — HTTPS + basic auth. Copied to conf.d/portainer.conf by prod-ssl / expand-ssl-portainer.
# Requires: portainer.andiko.cloud in the TLS certificate SAN.

upstream portainer_ui {
  server portainer:9000;
}

server {
  listen 80;
  listen [::]:80;
  server_name portainer.andiko.cloud;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name portainer.andiko.cloud;

  ssl_certificate /etc/letsencrypt/live/andiko.cloud/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/andiko.cloud/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  auth_basic "Portainer";
  auth_basic_user_file /etc/nginx/.htpasswd.portainer;

  location / {
    proxy_pass http://portainer_ui;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
