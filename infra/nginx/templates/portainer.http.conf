# Portainer HTTP bootstrap (ACME only) until prod-ssl installs portainer.ssl.conf.
# Installed to ${NGINX_CONF_DIR}/portainer.conf on the VPS — not tracked in git.

server {
  listen 80;
  listen [::]:80;
  server_name portainer.andiko.cloud;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 503;
  }
}
