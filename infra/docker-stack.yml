# Production Docker Swarm stack for Andiko.
# Deploy via: make prod-deploy TAG=vX.Y.Z
# Requires envsubst and variables from infra/.env.production (see deploy.sh).
#
# Resource sizing targets Hostinger KVM 4 (4 vCPU, 16 GB RAM). Limits cap runaway
# usage; reservations document minimums for scheduling. Tune via Portainer if
# sustained usage differs after load grows.

x-logging: &default-logging
  driver: local
  options:
    max-size: "50m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging: *default-logging
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    image: ${GHCR_IMAGE}:${IMAGE_TAG}
    environment:
      NODE_ENV: production
      AFIP_MODE: ${AFIP_MODE}
      NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ${NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
      NEXT_PUBLIC_UMAMI_HOST: ${NEXT_PUBLIC_UMAMI_HOST:-}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
      NEXT_PUBLIC_CAP_SITE_KEY: ${NEXT_PUBLIC_CAP_SITE_KEY:-}
      NEXT_PUBLIC_CAP_HOST: ${NEXT_PUBLIC_CAP_HOST:-}
      CAP_VERIFY_URL: ${CAP_VERIFY_URL:-}
      PORT: '3000'
      HOSTNAME: 0.0.0.0
    secrets:
      - database_url
      - auth_secret
      - auth_url
      - cron_secret
      - cap_secret
    networks:
      - web
      - internal
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '0.25'
          memory: 768M
    logging: *default-logging
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - ${REPO_ROOT}/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NGINX_CONF_DIR}:/etc/nginx/conf.d:ro
      - ${PORTAINER_HTPASSWD_FILE}:/etc/nginx/.htpasswd.portainer:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - web
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging: *default-logging

  portainer:
    image: portainer/portainer-ce:2.21.5
    command: -H unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - web
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging: *default-logging

  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    hostname: mail.andiko.cloud
    env_file:
      - ${MAIL_ENV_FILE}
    volumes:
      - ${MAIL_DATA_DIR}:/var/mail
      - ${MAIL_STATE_DIR}:/var/mail-state
      - ${MAIL_CONFIG_DIR}:/tmp/docker-mailserver
      - certbot_certs:/etc/letsencrypt:ro
    ports:
      - target: 25
        published: 25
        protocol: tcp
        mode: host
      - target: 587
        published: 587
        protocol: tcp
        mode: host
      - target: 465
        published: 465
        protocol: tcp
        mode: host
      - target: 993
        published: 993
        protocol: tcp
        mode: host
    networks:
      - internal
    cap_add:
      - NET_ADMIN
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
    logging: *default-logging
    stop_grace_period: 1m

  umami_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${UMAMI_POSTGRES_USER}
      POSTGRES_DB: ${UMAMI_POSTGRES_DB}
      POSTGRES_PASSWORD: ${UMAMI_POSTGRES_PASSWORD}
    volumes:
      - umami_data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M
    logging: *default-logging
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${UMAMI_POSTGRES_USER} -d ${UMAMI_POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    environment:
      DATABASE_URL: postgresql://${UMAMI_POSTGRES_USER}:${UMAMI_POSTGRES_PASSWORD}@umami_db:5432/${UMAMI_POSTGRES_DB}
      APP_SECRET: ${UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: '1'
      CLIENT_IP_HEADER: X-Forwarded-For
    networks:
      - web
      - internal
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M
    logging: *default-logging
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/heartbeat || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  cap_valkey:
    image: valkey/valkey:9-alpine
    command:
      - valkey-server
      - --save
      - ''
      - --loglevel
      - warning
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
    networks:
      - internal
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 64M
    logging: *default-logging
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  cap:
    image: tiago2/cap:latest
    environment:
      ADMIN_KEY: ${CAP_ADMIN_KEY}
      REDIS_URL: redis://cap_valkey:6379
    networks:
      - web
      - internal
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    logging: *default-logging
    healthcheck:
      test:
        - CMD-SHELL
        - bun -e 'fetch("http://127.0.0.1:3000/").then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  web:
    driver: overlay
    attachable: true
  internal:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_DIR}
  certbot_certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CERTBOT_CERTS_DIR}
  certbot_www:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CERTBOT_WWW_DIR}
  portainer_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PORTAINER_DATA_DIR}
  umami_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${UMAMI_DATA_DIR}

secrets:
  postgres_password:
    external: true
  database_url:
    external: true
  auth_secret:
    external: true
  auth_url:
    external: true
  cron_secret:
    external: true
  cap_secret:
    external: true
