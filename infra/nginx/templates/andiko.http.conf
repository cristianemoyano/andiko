upstream andiko_app {
  server app:3000;
}

server {
  listen 80;
  listen [::]:80;
  server_name andiko.cloud www.andiko.cloud;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTP-only bootstrap: used before SSL certs exist (prod-ssl swaps to andiko.ssl.conf)
