name: POS Release

on:
  push:
    tags:
      - "pos/v*"   # trigger: git tag pos/v1.0.0

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild better-sqlite3 for Electron
        env:
          POS_REBUILD_ARCH: x64
        run: node scripts/pos-rebuild-native.mjs

      - name: Build renderer + main
        working-directory: apps/pos
        run: pnpm run build

      - name: Package macOS DMG
        working-directory: apps/pos
        run: pnpm exec electron-builder --mac --publish never --config electron-builder.yml

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pos-mac
          path: apps/pos/dist/*.dmg
          retention-days: 7

  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild better-sqlite3 for Electron
        env:
          POS_REBUILD_ARCH: x64
        run: node scripts/pos-rebuild-native.mjs

      - name: Build renderer + main
        working-directory: apps/pos
        run: pnpm run build

      - name: Package Windows installer
        working-directory: apps/pos
        run: pnpm exec electron-builder --win --publish never --config electron-builder.yml

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pos-win
          path: apps/pos/dist/*.exe
          retention-days: 7

  publish:
    name: Publish to public releases repo
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#pos/}" >> $GITHUB_OUTPUT

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: pos-mac
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: pos-win
          path: artifacts/

      - name: Create tag in public repo
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=$(curl -s -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            https://api.github.com/repos/cristianemoyano/andiko-pos-releases/git/ref/heads/main \
            | jq -r '.object.sha')
          echo "Creating tag ${VERSION} at ${SHA}"
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/cristianemoyano/andiko-pos-releases/git/refs \
            -d "{\"ref\":\"refs/tags/${VERSION}\",\"sha\":\"${SHA}\"}"

      - name: Create GitHub Release in public repo
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: cristianemoyano/andiko-pos-releases
          tag_name: ${{ steps.version.outputs.version }}
          name: "Andiko POS ${{ steps.version.outputs.version }}"
          body: |
            ## Andiko POS ${{ steps.version.outputs.version }}

            ### Instalación
            - **macOS**: descargá el `.dmg`, abrilo y arrastrá la app a Aplicaciones
            - **Windows**: descargá el `.exe` y seguí el instalador

            ### Actualizaciones
            Descargá la nueva versión desde GitHub Releases cuando haya una actualización disponible.
          files: artifacts/*
          draft: false
          prerelease: false
