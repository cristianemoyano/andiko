# Portainer HTTP bootstrap (ACME only) until prod-ssl installs portainer.ssl.conf here.
# prod-ssl and expand-ssl-portainer.sh replace this file with templates/portainer.ssl.conf.

server {
  listen 80;
  listen [::]:80;
  server_name portainer.andiko.cloud;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 503;
  }
}
