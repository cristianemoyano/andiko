# HTTP bootstrap for new VPS — copied to ${NGINX_CONF_DIR}/portainer.conf by sync-nginx-conf.sh.
# After prod-ssl, the live file is replaced from infra/nginx/templates/portainer.ssl.conf.

server {
  listen 80;
  listen [::]:80;
  server_name portainer.andiko.cloud;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 503;
  }
}
