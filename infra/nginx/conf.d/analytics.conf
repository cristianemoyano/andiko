# HTTP bootstrap for new VPS — copied to ${NGINX_CONF_DIR}/analytics.conf by sync-nginx-conf.sh.
# After prod-ssl / expand-ssl-services, the live file is replaced from infra/nginx/templates/analytics.ssl.conf.

server {
  listen 80;
  listen [::]:80;
  server_name analytics.andiko.cloud;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 503;
  }
}
