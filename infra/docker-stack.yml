# Production Docker Swarm stack for Andiko.
# Deploy via: make prod-deploy TAG=vX.Y.Z
# Requires envsubst and variables from infra/.env.production (see deploy.sh).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    image: ${GHCR_IMAGE}:${IMAGE_TAG}
    environment:
      NODE_ENV: production
      AFIP_MODE: ${AFIP_MODE}
      PORT: '3000'
      HOSTNAME: 0.0.0.0
    secrets:
      - database_url
      - auth_secret
      - auth_url
      - cron_secret
    networks:
      - web
      - internal
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: stop-first
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - ${REPO_ROOT}/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${REPO_ROOT}/infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - web
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  web:
    driver: overlay
    attachable: true
  internal:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_DIR}
  certbot_certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CERTBOT_CERTS_DIR}
  certbot_www:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CERTBOT_WWW_DIR}

secrets:
  postgres_password:
    external: true
  database_url:
    external: true
  auth_secret:
    external: true
  auth_url:
    external: true
  cron_secret:
    external: true
