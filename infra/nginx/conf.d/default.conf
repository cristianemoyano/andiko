# HTTP bootstrap for new VPS — copied to ${NGINX_CONF_DIR}/default.conf by sync-nginx-conf.sh.
# After prod-ssl, the live file is replaced from infra/nginx/templates/andiko.ssl.conf.

upstream andiko_app {
  server app:3000;
}

server {
  listen 80;
  listen [::]:80;
  server_name andiko.cloud www.andiko.cloud;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    proxy_pass http://andiko_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }
}
