upstream andiko_app {
  server app:3000;
}

server {
  listen 80;
  listen [::]:80;
  server_name andiko.cloud www.andiko.cloud;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.andiko.cloud;

  ssl_certificate /etc/letsencrypt/live/andiko.cloud/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/andiko.cloud/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  # Canonical host is the apex (matches AUTH_URL); consolidate SEO signal onto one origin.
  return 301 https://andiko.cloud$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name andiko.cloud;

  ssl_certificate /etc/letsencrypt/live/andiko.cloud/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/andiko.cloud/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

  location / {
    proxy_pass http://andiko_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }
}
