services:
  postgres:
    image: postgres:16-alpine
    container_name: andiko_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-andiko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-andiko}
      POSTGRES_DB: ${POSTGRES_DB:-andiko_dev}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-andiko}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: andiko_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@andiko.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-andiko}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # --- WooCommerce dev store (profile woo — optional integration tests) — docs/dev/woocommerce-local.md
  woo-db:
    profiles: ["woo"]
    image: mariadb:11
    container_name: andiko_woo_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - woo_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  wordpress:
    profiles: ["woo"]
    image: wordpress:6.9-php8.2-apache
    container_name: andiko_woo_wordpress
    restart: unless-stopped
    ports:
      - "${WOO_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: woo-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - woo_wp_data:/var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/html/wp-config.php && curl -sf http://localhost/ > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    depends_on:
      woo-db:
        condition: service_healthy

  woo-init:
    profiles: ["woo-init"]
    image: wordpress:cli-2.11-php8.2
    container_name: andiko_woo_init
    user: "33:33"
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: woo-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WOO_STORE_URL: ${WOO_STORE_URL:-http://localhost:8080}
      WOO_ADMIN_USER: ${WOO_ADMIN_USER:-admin}
      WOO_ADMIN_PASSWORD: ${WOO_ADMIN_PASSWORD:-admin}
      WOO_ADMIN_EMAIL: ${WOO_ADMIN_EMAIL:-admin@andiko.local}
      WOO_CREDENTIALS_FILE: /output/credentials.env
      WP_CLI_CACHE_DIR: /tmp/wp-cli-cache
    volumes:
      - woo_wp_data:/var/www/html
      - ./infra/docker/woocommerce:/scripts:ro
      - ./infra/docker/woocommerce/dev-output:/output
    entrypoint: ["/bin/sh", "/scripts/bootstrap.sh"]

  # --- Umami + Cap (profile analytics — optional local testing)
  umami-db:
    profiles: ["analytics"]
    image: postgres:16-alpine
    container_name: andiko_umami_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
      POSTGRES_DB: umami
    ports:
      - "5434:5432"
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 5

  umami:
    profiles: ["analytics"]
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: andiko_umami
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami@umami-db:5432/umami
      APP_SECRET: local-dev-umami-secret-min-32-chars-long
      DISABLE_TELEMETRY: "1"
    depends_on:
      umami-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  cap-valkey:
    profiles: ["analytics"]
    image: valkey/valkey:9-alpine
    container_name: andiko_cap_valkey
    restart: unless-stopped
    command: valkey-server --save "" --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  cap:
    profiles: ["analytics"]
    image: tiago2/cap:latest
    container_name: andiko_cap
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      ADMIN_KEY: local-dev-cap-admin-key-min-32-chars
      REDIS_URL: redis://cap-valkey:6379
    depends_on:
      cap-valkey:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
  woo_db_data:
  woo_wp_data:
  umami_db_data:
