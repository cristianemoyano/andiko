# HTTP bootstrap for new VPS — copied to ${NGINX_CONF_DIR}/cap.conf by sync-nginx-conf.sh.
# After prod-ssl / expand-ssl-services, the live file is replaced from infra/nginx/templates/cap.ssl.conf.

server {
  listen 80;
  listen [::]:80;
  server_name cap.andiko.cloud;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 503;
  }
}
